# Fly.io — Streamlit (Financials) service
# Deploy:    fly deploy --config fly-streamlit.toml
# Do NOT use fly.toml for this app — that config is for the API only.

app = "ali-al-baker-streamlit"
primary_region = "iad"

[build]
  dockerfile = "deploy/Dockerfile.streamlit"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "60s"
    interval = "30s"
    method = "GET"
    path = "/"
    timeout = "10s"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
